<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gethin | Terminal Access</title>
    <meta name="description" content="Choose a destination from the terminal prompt.">
    <style>
        :root {
            --bg: #05070f;
            --panel: #0d121f;
            --line: #263148;
            --text: #d9fbe7;
            --accent: #39ff7a;
            --muted: #98b5a2;
            --error: #ff8f8f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top, #121a2d 0%, var(--bg) 60%);
            color: var(--text);
            font-family: "Consolas", "SFMono-Regular", "Menlo", "Monaco", monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .terminal {
            width: min(700px, 100%);
            border: 1px solid var(--line);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.45);
            background: var(--panel);
        }

        .terminal-head {
            border-bottom: 1px solid var(--line);
            padding: 10px 14px;
            color: var(--muted);
            font-size: 0.85rem;
            background: rgba(0, 0, 0, 0.25);
        }

        .terminal-body {
            padding: 18px 14px;
        }

        .line {
            margin-bottom: 10px;
            color: var(--muted);
        }

        .prompt-row {
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.25);
        }

        .prompt {
            color: var(--accent);
            white-space: nowrap;
        }

        input {
            flex: 1;
            border: 0;
            background: transparent;
            color: var(--text);
            font: inherit;
            outline: none;
        }

        input::placeholder {
            color: #6e8b78;
        }

        button {
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--accent);
            border-radius: 6px;
            padding: 7px 10px;
            font: inherit;
            cursor: pointer;
        }

        button:hover {
            background: rgba(57, 255, 122, 0.12);
        }

        #welcomeFeedback {
            margin-top: 10px;
            min-height: 1.2em;
            color: var(--muted);
            font-size: 0.9rem;
        }

        #welcomeFeedback.error {
            color: var(--error);
        }
    </style>
</head>
<body>
    <main class="terminal" role="main">
        <div class="terminal-head">terminal@gethin101.github.io</div>
        <div class="terminal-body">
            <p class="line">Destination command required.</p>
            <form id="welcomeForm" autocomplete="off">
                <div class="prompt-row">
                    <span class="prompt">$</span>
                    <input id="welcomeInput" type="text" placeholder="enter command" aria-label="Destination command" />
                    <button type="submit">run</button>
                </div>
            </form>
            <p id="welcomeFeedback"></p>
            <noscript><p class="line">JavaScript is required to continue.</p></noscript>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById("welcomeForm");
            const input = document.getElementById("welcomeInput");
            const feedback = document.getElementById("welcomeFeedback");

            const portfolioCommands = ["portfolio", "projects", "project", "home", "site", "index", "main"];
            const gamesCommands = ["games", "game", "play", "sparx", "sparxmaths"];

            const redirectTo = (url, message) => {
                feedback.classList.remove("error");
                feedback.textContent = message;
                setTimeout(() => window.location.assign(url), 120);
            };

            const handleInput = () => {
                const command = input.value.trim().toLowerCase();

                if (!command) {
                    feedback.classList.add("error");
                    feedback.textContent = "Enter a command.";
                    return;
                }

                if (portfolioCommands.some((entry) => command.includes(entry))) {
                    redirectTo("/portfolio/index.html", "Redirecting...");
                    return;
                }

                if (gamesCommands.some((entry) => command.includes(entry))) {
                    redirectTo("https://sparxmaths.github.io", "Redirecting...");
                    return;
                }

                feedback.classList.add("error");
                feedback.textContent = "Unknown command.";
            };

            form.addEventListener("submit", (event) => {
                event.preventDefault();
                handleInput();
            });

            input.addEventListener("keydown", (event) => {
                if (event.key === "Enter") {
                    event.preventDefault();
                    handleInput();
                }
            });

            input.focus();
        });
    </script>
</body>
</html>
