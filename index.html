<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gethin | Search</title>
    <meta name="description" content="Search the site or choose a destination.">
    <style>
        :root {
            --bg: #f6f7f9;
            --card: #ffffff;
            --accent: #0066cc;
            --text: #0b1220;
            --muted: #56606a;
            --error: #d9534f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: linear-gradient(180deg,#f8fafc 0%, #eef2f6 100%);
            color: var(--text);
            font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .search-card {
            width: min(760px, 100%);
            background: var(--card);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(16,24,40,0.08);
            padding: 32px;
            text-align: center;
        }

        h1 {
            font-size: 1.25rem;
            margin-bottom: 8px;
            color: var(--text);
        }

        p.lead {
            color: var(--muted);
            margin-bottom: 20px;
        }

        form { display: flex; gap: 10px; align-items: center; justify-content: center; }

        input[type="search"] {
            width: 100%;
            max-width: 560px;
            padding: 12px 14px;
            border-radius: 8px;
            border: 1px solid #d6dce6;
            font-size: 1rem;
            color: var(--text);
            outline: none;
        }

        input[type="search"]:focus { box-shadow: 0 0 0 4px rgba(0,102,204,0.08); border-color: var(--accent); }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        button.secondary {
            background: transparent;
            color: var(--accent);
            border: 1px solid #cfe6ff;
        }

        #feedback {
            margin-top: 14px;
            color: var(--muted);
            font-size: 0.95rem;
            min-height: 1.1em;
        }

        #feedback.error { color: var(--error); }

        .links { margin-top: 16px; display: flex; gap: 12px; justify-content: center; }

        a.small {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.95rem;
        }

        @media (max-width: 520px) {
            .search-card { padding: 20px; }
            input[type="search"] { max-width: 100%; }
            form { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>
    <main class="search-card" role="main">
        <h1>Gethin's Site</h1>
        <p class="lead">Search the site or enter a destination (e.g., &quot;portfolio&quot; or &quot;games&quot;).</p>

        <form id="searchForm" autocomplete="off">
            <input id="searchInput" type="search" placeholder="Search site or type a command" aria-label="Search or command" />
            <button type="submit">Search</button>
        </form>

        <p id="feedback"></p>

        <div class="links">
            <a class="small" href="/portfolio/index.html">Portfolio</a>
            <a class="small" href="https://sparxmaths.github.io">Games</a>
            <a class="small" href="/about/">About</a>
        </div>

        <noscript><p style="color:var(--muted);margin-top:12px;">JavaScript is required for the interactive search.</p></noscript>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('searchForm');
            const input = document.getElementById('searchInput');
            const feedback = document.getElementById('feedback');

            const portfolioCommands = ["portfolio", "projects", "project", "home", "site", "index", "main"];
            const gamesCommands = ["games", "game", "play", "sparx", "sparxmaths"];

            const showFeedback = (msg, isError = false) => {
                feedback.classList.toggle('error', !!isError);
                feedback.textContent = msg;
            };

            const handleQuery = (raw) => {
                const q = raw.trim();
                if (!q) {
                    showFeedback('Please enter a search term or command.', true);
                    return;
                }

                const lower = q.toLowerCase();

                if (portfolioCommands.some(entry => lower.includes(entry))) {
                    showFeedback('Opening portfolio...');
                    setTimeout(() => window.location.assign('/portfolio/index.html'), 120);
                    return;
                }

                if (gamesCommands.some(entry => lower.includes(entry))) {
                    showFeedback('Opening games...');
                    setTimeout(() => window.location.assign('https://sparxmaths.github.io'), 120);
                    return;
                }

                // Fallback: site-scoped Google search
                showFeedback('Searching site...');
                const searchUrl = 'https://www.google.com/search?q=' + encodeURIComponent(q + ' site:gethin101.github.io');
                setTimeout(() => window.location.assign(searchUrl), 120);
            };

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                handleQuery(input.value);
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleQuery(input.value);
                }
            });

            input.focus();
        });
    </script>
</body>
</html>
