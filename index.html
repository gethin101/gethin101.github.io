<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gethin | Redirects</title>
    <meta name="description" content="Search command interface.">
    <style>
        :root {
            --bg: #0b1220;
            --bg-soft: #111a2b;
            --card: #0f1728;
            --accent: #4da3ff;
            --text: #e6edf7;
            --muted: #9fb0c7;
            --error: #ff7b72;
            --border: #23324a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: radial-gradient(1200px 600px at 20% -10%, #1a2740 0%, var(--bg) 55%);
            color: var(--text);
            font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .search-card {
            width: min(760px, 100%);
            background: linear-gradient(180deg, #121d31 0%, var(--card) 100%);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
            padding: 30px;
            text-align: center;
        }

        h1 {
            font-size: 1.3rem;
            margin-bottom: 8px;
            color: var(--text);
        }

        p.lead {
            color: var(--muted);
            margin-bottom: 20px;
        }

        form {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
        }

        input[type="search"] {
            width: 100%;
            max-width: 560px;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-soft);
            font-size: 1rem;
            color: var(--text);
            outline: none;
        }

        input[type="search"]::placeholder {
            color: #7f93b1;
        }

        input[type="search"]:focus {
            box-shadow: 0 0 0 4px rgba(77, 163, 255, 0.15);
            border-color: var(--accent);
        }

        button {
            background: var(--accent);
            color: #071223;
            border: none;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
        }

        #feedback {
            margin-top: 14px;
            color: var(--muted);
            font-size: 0.95rem;
            min-height: 1.2em;
        }

        #feedback.error {
            color: var(--error);
        }

        @media (max-width: 520px) {
            .search-card { padding: 20px; }
            input[type="search"] { max-width: 100%; }
            form { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>
    <main class="search-card" role="main">
        <h1>Destination</h1>
        <p class="lead">Type a command and press enter to redirect.</p>

        <form id="searchForm" autocomplete="off">
            <input id="searchInput" type="search" placeholder="Enter command..." aria-label="Search command" />
            <button type="submit">Search</button>
        </form>

        <p id="feedback" aria-live="polite"></p>

        <noscript>
            <p style="color:var(--muted);margin-top:12px;">JavaScript is required for search.</p>
        </noscript>
    </main>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const form = document.getElementById('searchForm');
        const input = document.getElementById('searchInput');
        const feedback = document.getElementById('feedback');

        const redirects = {
            "portfolio": "https://gethin101.github.io/portfolio",
            "portfolios": "https://gethin101.github.io/portfolio",
            "game": "https://sparxmaths.github.io",
            "games": "https://sparxmaths.github.io",
            "flipper": "https://www.gethin.app",
            "ghost": "https://www.gethin.app/",
            "sparx": "https://sparxmaths.github.io",
            "sparxmaths": "https://sparxmaths.github.io",
            "os": "https://gethingrice.com/os",
            "gj": "https://gethingrice.com/gj-warfare",
            "warfare": "https://gethingrice.com/gj-warfare",
            "gj-warfare": "https://gethingrice.com/gj-warfare"
        };

        const showFeedback = (msg, isError = false) => {
            feedback.classList.toggle('error', !!isError);
            feedback.textContent = msg;
        };

        const handleQuery = (raw) => {
            const q = raw.trim();
            if (!q) {
                showFeedback('Please enter a command.', true);
                return;
            }

            const lower = q.toLowerCase();

            if (redirects[lower]) {
                showFeedback(`Redirecting to ${lower}...`);
                window.location.href = redirects[lower];
                return;
            }

            showFeedback(`Unknown command: "${q}"`, true);
        };

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            handleQuery(input.value);
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleQuery(input.value);
            }
        });

        input.focus();
    });
</script>
</body>
</html>
